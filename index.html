<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="index.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Overpass:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Interactive rating component</title>

</head>
<body>
  <main>
    <!-- Rating state start -->
    <article id="rating-box">
      <div class="circle-img-box">
        <img id="rating-star-img" src="images/icon-star.svg" alt="Star"/>
      </div>
      <h2 class="header_box header_rate_section">How did we do?</h2>

      <p class="text-box">
        Please let us know how we did with your support request. All feedback is appreciated
      to help us improve our offering!
      </p>
      <form id="rating-form">
        <div class="grade-section">
          <label class="rate-label">
            <input type="radio" name="rating" id="rating-1" class="circle-rate-box" value="1"/>
            <span>1</span>
          </label>
          <label class="rate-label">
            <input type="radio" name="rating" id="rating-2" class="circle-rate-box" value="2"/>
            <span>2</span>
          </label>
          <label class="rate-label">
            <input type="radio" name="rating" id="rating-3" class="circle-rate-box" value="3"/>
            <span>3</span>
          </label>
          <label class="rate-label">
            <input type="radio" name="rating" id="rating-4" class="circle-rate-box" value="4"/>
            <span>4</span>
          </label>
          <label class="rate-label">
            <input type="radio" name="rating" id="rating-5" class="circle-rate-box" value="5"/>
            <span>5</span>
          </label>
        </div>
        <button class="submit-button" type="submit">SUBMIT</button>
      </form>
    </article>

    <!-- Rating state end -->

    <!-- Thank you state start -->

    <article id="thank-you-box" class="hidden">
      <img id="thank-you-img" src="images/illustration-thank-you.svg" alt="Thank you"/>
      <p class="text-box" id="rating-text"> You selected
        <span id="rating-note"></span>
        out of 5 </p>
      <h2 class="header_box thank-you-text header_thank_you_section">Thank you!</h2>

      <p class="text-box thank-you-text">
        We appreciate you taking the time to give a rating. If you ever need more support,
        don’t hesitate to get in touch!
      </p>
    </article>

    <!-- Thank you state end -->
  </main>
  <script src="index.js"></script>
</body>
</html>
